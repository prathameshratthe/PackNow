# Render deployment — Backend only (Frontend deploys to Vercel)
services:
  - type: web
    name: packnow-api
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually from Neon dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false  # Set to your Vercel frontend URL after deploying
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: PYTHON_VERSION
        value: "3.11.0"
